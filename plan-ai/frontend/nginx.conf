map $host $page_title {
    default "Plan AI – Transcript-to-Task Project Management";
    "~*housegroup" "House Group Plan AI – AI Meeting Transcription";
}

map $host $page_description {
    default "Plan AI helps product teams turn meeting transcripts into structured tasks, boards, and timelines powered by intelligent automation.";
    "~*housegroup" "House Group Plan AI automatically transforms your meetings and interviews into organized data for your agency.";
}

map $host $page_image {
    default "https://plan-ai.blueberrybytes.com/logos/android-chrome-512x512.png";
    "~*housegroup" "https://plan-ai.blueberrybytes.com/logos/housegroup/logo512.png";
}

map $host $site_name_text {
    default "Plan AI";
    "~*housegroup" "House Group Plan AI";
}

map $host $theme_color_hex {
    default "#2F80ED";
    "~*housegroup" "#161616";
}

map $host $favicon_path {
    default "/logos/favicon.ico";
    "~*housegroup" "/logos/housegroup/favicon.ico";
}

map $host $apple_touch_path {
    default "/logos/apple-touch-icon.png";
    "~*housegroup" "/logos/housegroup/logo192.png";
}

server {
    listen 3000;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Dynamic Meta Tags for Multi-Tenant SEO
    sub_filter 'content="Plan AI – Transcript-to-Task Project Management"' 'content="$page_title"';
    sub_filter '<title>Plan AI – Transcript-to-Task Project Management</title>' '<title>$page_title</title>';
    sub_filter 'content="Plan AI helps product teams turn meeting transcripts into structured tasks, boards, and timelines powered by intelligent automation."' 'content="$page_description"';
    sub_filter 'content="https://plan-ai.blueberrybytes.com/logos/android-chrome-512x512.png"' 'content="$page_image"';
    sub_filter 'content="Plan AI"' 'content="$site_name_text"';
    sub_filter 'content="#2F80ED"' 'content="$theme_color_hex"';
    sub_filter 'href="/logos/favicon.ico"' 'href="$favicon_path"';
    sub_filter 'href="/logos/apple-touch-icon.png"' 'href="$apple_touch_path"';
    sub_filter_once off;

    # Serve legal pages as distinct, crawlable documents (no redirect to /)
    # Handle both with and without trailing slash
    location = /privacy-policy {
        try_files /privacy-policy/index.html =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /privacy-policy/ {
        try_files /privacy-policy/index.html =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /terms-of-service {
        try_files /terms-of-service/index.html =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /terms-of-service/ {
        try_files /terms-of-service/index.html =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /customer-support {
        try_files /customer-support/index.html =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /customer-support/ {
        try_files /customer-support/index.html =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Serve static files / SPA fallback for everything else
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 15d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
